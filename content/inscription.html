    <main>
        <div class="titrepage">
            <h1>Inscription</h1>
            <p>Créez votre compte Candles</p>
        </div>

        <div class="formulaire">
        <form id="formInscription">
        <div class="champ">
          <label>Nom complet :</label>
          <input type="text" id="nom" placeholder="Saisissez votre nom">
          <small class="erreur" id="erreurNom"></small>
        </div>
               
        <div class="champ">
             <label>Email :</label>
             <input type="email" id="email" placeholder="Saisissez votre email">
          <small class="erreur" id="erreurEmail"></small>
        </div>

                <div class="champ">
                    <label>Téléphone :</label>
                    <input type="tel" id="tel" placeholder="Saisissez votre numéro de téléphone">
                    <small class="erreur" id="erreurTel"></small>
                </div>

                <div class="champ">
                    <label>Mot de passe :</label>
                    <input type="password" id="mdp" placeholder="Saisissez votre mot de passe">
                    <small class="erreur" id="erreurMdp"></small>
                </div>

                <div class="champ">
                    <label>Confirmation du mot de passe :</label>
                    <input type="password" id="mdp2" placeholder="Confirmez votre mot de passe">
                    <small class="erreur" id="erreurMdp2"></small>
                </div>

                <button type="submit" class="bouton">S'inscrire</button>
            </form>
            <p class="lienconnexion">Déjà un compte ? <a href="connexion.html">Connectez-vous</a></p>
        </div>
    </main>
